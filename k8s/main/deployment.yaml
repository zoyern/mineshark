# ═══════════════════════════════════════════════════════════════════
#  Deployment mc-main (serveur Paper — lobby + survie)
# ═══════════════════════════════════════════════════════════════════
#  Aligné avec docker-compose.yml service `main-paper`.
#  Toute valeur en dur ici est marquée « synced with .env <VAR> ».
#  Si tu changes la VAR dans .env, change ici aussi.
#
#  Paper = standard de facto, meilleure matrice plugins Modrinth.
#  Pour rebasculer vers Purpur : change TYPE ici + .env + remount
#  config/purpur.yml (voir docs/forks-comparison.md).
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mc-main
  namespace: mineshark
  labels:
    app: mc-main
    component: server
spec:
  replicas: 1
  strategy:
    type: Recreate          # PVC RWO + Minecraft monothread → pas de rolling
  selector:
    matchLabels:
      app: mc-main
  template:
    metadata:
      labels:
        app: mc-main
        component: server
    spec:
      # Sécurité pod-level : non-root, FS cohérent avec PVC (1000:1000)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      # itzg copie /config/*.yml dans /data/config/ — OK pour paper-*.yml
      # mais Paper lit bukkit.yml/spigot.yml à la RACINE de /data/. On copie
      # explicitement avant que le container principal démarre. Idempotent :
      # on écrase à chaque boot pour garder ConfigMap comme source de vérité.
      initContainers:
        - name: copy-bukkit-yml
          image: busybox:1.36.1
          command: ["sh", "-c"]
          args:
            - |
              set -e
              if [ -f /config/bukkit.yml ]; then
                cp /config/bukkit.yml /data/bukkit.yml
                echo "✓ bukkit.yml copié à /data/bukkit.yml"
              else
                echo "⚠️  /config/bukkit.yml absent, skip"
              fi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: server-config
              mountPath: /config
              readOnly: true
      containers:
        - name: minecraft
          image: itzg/minecraft-server:java21    # synced with .env IMG_SERVER
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: EULA
              value: "TRUE"
            - name: TYPE
              value: PAPER                       # synced with .env SERVER_TYPE
            - name: VERSION
              value: "1.21.10"                   # synced with .env PAPER_VERSION
              # ⚠️ Bloqué à 1.21.10 : CoreProtect CE v23.1 = dernière version
              # publiée sur Modrinth (déc 2025), supporte jusqu'à 1.21.10.
              # Quand CoreProtect sortira un build 1.21.11 → bump ici + .env.
            - name: MEMORY
              value: "4G"                        # synced with .env MAIN_MEMORY
            - name: USE_AIKAR_FLAGS
              value: "true"
            # Relance toutes les X heures le contrôle de version (Modrinth + Spiget).
            # Si nouvelle version compatible dispo → téléchargée au prochain boot.
            # Ne force PAS le re-download à chaque boot (serait trop brutal).
            # Pour update manuel immédiat : `make update-plugins`.
            - name: SPIGET_UPDATE_CHECK_INTERVAL
              value: "4320"    # 72h en minutes
            - name: LEVEL
              value: "hub"                              # était "world" implicite
            - name: LEVEL_TYPE
              value: "minecraft:flat"                   # pas de génération naturelle
            - name: GENERATOR_SETTINGS
              value: '{"biome":"minecraft:the_void","layers":[]}'   # void absolu
            # Empêche la création auto de hub_nether/ et hub_the_end/ au 1er boot.
            # Tu pourras créer les dimensions à la demande via :
            #   /mv create nether_world nether
            #   /mv create end_world end
            - name: ALLOW_NETHER
              value: "FALSE"
            - name: ALLOW_END
              value: "FALSE"

            # Velocity authentifie ; ce backend trust le proxy via secret
            - name: ONLINE_MODE
              value: "FALSE"
            - name: PAPER_VELOCITY_SECRET
              valueFrom:
                secretKeyRef:
                  name: velocity-forwarding-secret
                  key: forwarding-secret

            - name: MOTD
              value: "§b§lMineShark §7- §aSurvie & Lobby"   # synced with .env MAIN_MOTD
            - name: MAX_PLAYERS
              value: "50"                                   # synced with .env MAIN_MAX_PLAYERS
            - name: DIFFICULTY
              value: "normal"                               # synced with .env DIFFICULTY_MAIN
            # 0 = désactivé (utile en lobby : WorldGuard fera la protection
            # de façon plus fine via régions).
            - name: SPAWN_PROTECTION
              value: "0"

            - name: VIEW_DISTANCE
              value: "8"                                    # synced with .env VIEW_DISTANCE
            - name: SIMULATION_DISTANCE
              value: "5"                                    # synced with .env SIMULATION_DISTANCE
            - name: SPAWN_LIMIT
              value: "40"

            - name: ENABLE_RCON
              value: "TRUE"
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rcon-secret
                  key: rcon-password

            # Plugins via Modrinth — résolution automatique des versions
            # (synced avec .env PLUGINS_MODRINTH)
            # NOTE: essentialsx retiré de Modrinth car leur packaging lag
            # derrière GitHub (ex. 2.21.0 Modrinth vs 2.21.2 GitHub).
            # On le tire directement depuis GitHub via PLUGINS (voir ci-dessous).
            - name: MODRINTH_PROJECTS
              value: "luckperms,worldedit,worldguard,coreprotect,multiverse-core,decentholograms,placeholderapi,chunky"
            # Plugins SpigotMC (pas dispos sur Modrinth) : Vault (34315),
            # ProtocolLib (1997). Synced avec .env PLUGINS_SPIGET.
            - name: SPIGET_RESOURCES
              value: "34315,1997"
            # Hors-Modrinth/Spiget :
            #   • Floodgate (GeyserMC)
            #   • ViaVersion / ViaBackwards : compat clients 1.8 → 1.21
            #   • EssentialsX : tiré direct depuis GitHub (Modrinth lag)
            - name: PLUGINS
              value: |-
                https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot
                https://github.com/ViaVersion/ViaVersion/releases/download/5.8.1/ViaVersion-5.8.1.jar
                https://github.com/ViaVersion/ViaBackwards/releases/download/5.8.1/ViaBackwards-5.8.1.jar
                https://github.com/EssentialsX/Essentials/releases/download/2.21.2/EssentialsX-2.21.2.jar

          ports:
            - containerPort: 25565
              name: minecraft
            - containerPort: 25575
              name: rcon
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              # Règle Aikar : limit = heap (MEMORY) × 1.35 (metaspace + direct + code cache + stacks)
              # heap 4G → 5.5Gi. Si tu baisses MEMORY à 3G, remets 4Gi.
              memory: "5500Mi"   # synced with .env MAIN_MEMORY (4G × 1.35)
              cpu: "2000m"
          # Probes — Purpur 1.21 + plugins = 90-120s au 1er boot.
          # On tolère jusqu'à 180s + 3 échecs avant liveness kill.
          readinessProbe:
            exec: { command: ["mc-health"] }
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec: { command: ["mc-health"] }
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
            # ConfigMap mineshark-paper-config (généré par `make secrets`)
            # monte les YAML de tuning au 1er boot — itzg les copie dans /data.
            - name: server-config
              mountPath: /config
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: server-main-pvc
        - name: server-config
          configMap:
            name: mineshark-paper-config
            optional: true          # tolère l'absence en dev, utile en CI dry-run
