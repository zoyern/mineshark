# ═══════════════════════════════════════════════════════════════════
#  Deployment mc-main (serveur Paper — lobby + survie)
# ═══════════════════════════════════════════════════════════════════
#  Aligné avec docker-compose.yml service `main-paper`.
#  Toute valeur en dur ici est marquée « synced with .env <VAR> ».
#  Si tu changes la VAR dans .env, change ici aussi.
#
#  Paper = standard de facto, meilleure matrice plugins Modrinth.
#  Pour rebasculer vers Purpur : change TYPE ici + .env + remount
#  config/purpur.yml (voir docs/forks-comparison.md).
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mc-main
  namespace: mineshark
  labels:
    app: mc-main
    component: server
spec:
  replicas: 1
  strategy:
    type: Recreate          # PVC RWO + Minecraft monothread → pas de rolling
  selector:
    matchLabels:
      app: mc-main
  template:
    metadata:
      labels:
        app: mc-main
        component: server
    spec:
      # Sécurité pod-level : non-root, FS cohérent avec PVC (1000:1000)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      # itzg copie /config/*.yml dans /data/config/ — OK pour paper-*.yml
      # mais Paper lit bukkit.yml/spigot.yml à la RACINE de /data/. On copie
      # explicitement avant que le container principal démarre. Idempotent :
      # on écrase à chaque boot pour garder ConfigMap comme source de vérité.
      initContainers:
        - name: copy-bukkit-yml
          image: busybox:1.36.1
          command: ["sh", "-c"]
          args:
            - |
              set -e
              if [ -f /config/bukkit.yml ]; then
                cp /config/bukkit.yml /data/bukkit.yml
                echo "✓ bukkit.yml copié à /data/bukkit.yml"
              else
                echo "⚠️  /config/bukkit.yml absent, skip"
              fi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: server-config
              mountPath: /config
              readOnly: true
        # ─── Sync des jars "plugins/manual/" → /data/plugins/ ────────────
        # Workflow "drop le jar" pour les plugins qu'on ne peut PAS tirer
        # via MODRINTH_PROJECTS/SPIGET_RESOURCES/PLUGINS (URL) :
        #   - BuiltByBit payants (distribué avec licence, pas d'URL publique)
        #   - plugins disparus du marketplace (qu'on a sauvegardés)
        #   - jars custom qu'on compile nous-mêmes
        #
        # Pipeline :
        #   dev : `make plugins-sync` (rsync plugins/manual/*.jar → VPS)
        #   VPS : /var/lib/mineshark/manual-plugins/*.jar (hostPath, persistent)
        #   pod : initContainer copie /manual-plugins/*.jar → /data/plugins/
        #   rollout restart → itzg charge les jars au prochain boot
        #
        # On copie AU-DESSUS de ce que MODRINTH/SPIGET ont téléchargé : les
        # manuels gagnent (même nom de jar = on écrase). Permet de pinner
        # une version précise en pinant le jar dans plugins/manual/.
        - name: copy-manual-plugins
          image: busybox:1.36.1
          command: ["sh", "-c"]
          args:
            - |
              set -e
              mkdir -p /data/plugins
              # 1) Plugins "classiques" dans /data/plugins/
              if [ -d /manual-plugins ] && ls /manual-plugins/*.jar >/dev/null 2>&1; then
                cp -f /manual-plugins/*.jar /data/plugins/
                count=$(ls /manual-plugins/*.jar | wc -l)
                echo "✓ $count plugin(s) manuel(s) copié(s) dans /data/plugins/"
                ls -1 /manual-plugins/*.jar | sed 's|.*/|  → |'
              else
                echo "ℹ️  /manual-plugins vide ou absent — skip (normal si aucun plugin manuel)"
              fi
              # 2) Addons BentoBox dans /data/plugins/BentoBox/addons/
              #    (NE PAS mettre dans /data/plugins/ — BentoBox ignore.)
              mkdir -p /data/plugins/BentoBox/addons
              if [ -d /manual-bentobox-addons ] && ls /manual-bentobox-addons/*.jar >/dev/null 2>&1; then
                cp -f /manual-bentobox-addons/*.jar /data/plugins/BentoBox/addons/
                acount=$(ls /manual-bentobox-addons/*.jar | wc -l)
                echo "✓ $acount addon(s) BentoBox copié(s) dans /data/plugins/BentoBox/addons/"
                ls -1 /manual-bentobox-addons/*.jar | sed 's|.*/|  → |'
              else
                echo "ℹ️  /manual-bentobox-addons vide ou absent — skip (normal si pas d'addon)"
              fi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: manual-plugins
              mountPath: /manual-plugins
              readOnly: true
            - name: manual-bentobox-addons
              mountPath: /manual-bentobox-addons
              readOnly: true
      containers:
        - name: minecraft
          image: itzg/minecraft-server:java21    # synced with .env IMG_SERVER
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: EULA
              value: "TRUE"
            - name: TYPE
              value: PAPER                       # synced with .env SERVER_TYPE
            - name: VERSION
              value: "1.21.8"                    # synced with .env PAPER_VERSION
              # ⚠️ Bloqué à 1.21.8 (LTS de facto) :
              #   • EssentialsX 2.21.2 officiellement testée sur 1.21.8
              #   • WorldEdit 7.3.16 (Modrinth) couvre 1.21.3 → 1.21.8
              #   • CoreProtect CE 23.0/23.1 supportent 1.21.8
              # Au-dessus (1.21.9-11) → warnings "unsupported" + adapter
              # fallback. Pour rebumper : attendre WorldEdit 7.4.x stable
              # + EssentialsX 2.22.x.
            - name: MEMORY
              value: "4G"                        # synced with .env MAIN_MEMORY
            - name: USE_AIKAR_FLAGS
              value: "true"
            # Relance toutes les X heures le contrôle de version (Modrinth + Spiget).
            # Si nouvelle version compatible dispo → téléchargée au prochain boot.
            # Ne force PAS le re-download à chaque boot (serait trop brutal).
            # Pour update manuel immédiat : `make update-plugins`.
            - name: SPIGET_UPDATE_CHECK_INTERVAL
              value: "4320"    # 72h en minutes
            - name: LEVEL
              value: "hub"                              # était "world" implicite
            - name: LEVEL_TYPE
              value: "minecraft:flat"                   # pas de génération naturelle
            - name: GENERATOR_SETTINGS
              value: '{"biome":"minecraft:the_void","layers":[]}'   # void absolu
            # Empêche la création auto de hub_nether/ et hub_the_end/ au 1er boot.
            # Tu pourras créer les dimensions à la demande via :
            #   /mv create nether_world nether
            #   /mv create end_world end
            - name: ALLOW_NETHER
              value: "FALSE"
            - name: ALLOW_END
              value: "FALSE"

            # Velocity authentifie ; ce backend trust le proxy via secret
            - name: ONLINE_MODE
              value: "FALSE"
            - name: PAPER_VELOCITY_SECRET
              valueFrom:
                secretKeyRef:
                  name: velocity-forwarding-secret
                  key: forwarding-secret

            - name: MOTD
              value: "§b§lMineShark §7- §aSurvie & Lobby"   # synced with .env MAIN_MOTD
            - name: MAX_PLAYERS
              value: "50"                                   # synced with .env MAIN_MAX_PLAYERS
            - name: DIFFICULTY
              value: "normal"                               # synced with .env DIFFICULTY_MAIN
            # 0 = désactivé (utile en lobby : WorldGuard fera la protection
            # de façon plus fine via régions).
            - name: SPAWN_PROTECTION
              value: "0"

            - name: VIEW_DISTANCE
              value: "8"                                    # synced with .env VIEW_DISTANCE
            - name: SIMULATION_DISTANCE
              value: "5"                                    # synced with .env SIMULATION_DISTANCE
            - name: SPAWN_LIMIT
              value: "40"

            - name: ENABLE_RCON
              value: "TRUE"
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rcon-secret
                  key: rcon-password

            # Plugins via Modrinth — syntaxe `slug[:version]`.
            # (synced avec .env PLUGINS_MODRINTH)
            # NOTE: essentialsx retiré de Modrinth car leur packaging lag
            # derrière GitHub (ex. 2.21.0 Modrinth vs 2.21.2 GitHub).
            # On le tire directement depuis GitHub via PLUGINS (voir ci-dessous).
            #
            # Pinning explicite :
            #   • worldedit:7.3.16 → dernière qui supporte officiellement 1.21.8.
            #     Sans pin, itzg prend 7.4.2 qui est dev build pour 1.21.9+
            #     et fallback sur un adapter 1.21.6 (warning "not tested").
            - name: MODRINTH_PROJECTS
              value: "luckperms,worldedit:7.3.16,worldguard,coreprotect,multiverse-core,decentholograms,placeholderapi,chunky"
            # Plugins SpigotMC (pas dispos sur Modrinth) — synced avec
            # .env PLUGINS_SPIGET et docs/plugins.md section 2 :
            #   ─ Core/libs ─
            #     34315  vault             — API économie (prérequis bcp plugins)
            #     1997   protocollib       — lib paquets (dep WorldGuard/SWR/etc)
            #   ─ Navigation hub ─
            #     14356  advanced-portals  — portails lobby ↔ hub-minigames
            #   ─ Mini-jeux ─
            #     53359  tntrun_reloaded   — TntRun (compat 1.13 → 1.21)
            #     69436  skywarsreloaded   — SkyWars (fork lukasvdgaag, FREE)
            #     63714  screamingbedwars  — BedWars 1.21.x (remplace BW1058)
            #     118673 spleef_reloaded   — Spleef/Splegg (steve4744)
            #     66614  mystery           — MurderMystery (Plugily-Projects)
            #     81185  oitc              — One In The Chamber (Despical)
            #   ─ Skyblock ─
            #     73261  bentobox          — plateforme Skyblock/OneBlock
            #                                 (addon AOneBlock via plugins/manual/
            #                                  bentobox-addons/, pas auto)
            #   ─ Divers ─
            #     113931 <slot existant>   — voir docs/plugins.md
            #
            # Ajout/retrait : MAJ docs/plugins.md + .env + .env.example + ici
            # (section 7 "checklist cohérence" de docs/plugins.md).
            # itzg retélécharge à chaque boot si la version Spiget est plus
            # récente (contrôle via SPIGET_UPDATE_CHECK_INTERVAL = 72h).
            # Pour forcer un refresh immédiat : `make redeploy-plugins`.
            - name: SPIGET_RESOURCES
              value: "34315,1997,14356,53359,69436,63714,118673,66614,81185,73261,113931"
            # Hors-Modrinth/Spiget :
            #   • Floodgate (GeyserMC)
            #   • ViaVersion / ViaBackwards : compat clients 1.8 → 1.21
            #   • EssentialsX : tiré direct depuis GitHub (Modrinth lag)
            - name: PLUGINS
              value: |-
                https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot
                https://github.com/ViaVersion/ViaVersion/releases/download/5.8.1/ViaVersion-5.8.1.jar
                https://github.com/ViaVersion/ViaBackwards/releases/download/5.8.1/ViaBackwards-5.8.1.jar
                https://github.com/EssentialsX/Essentials/releases/download/2.21.2/EssentialsX-2.21.2.jar

          ports:
            - containerPort: 25565
              name: minecraft
            - containerPort: 25575
              name: rcon
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              # Règle Aikar : limit = heap (MEMORY) × 1.35 (metaspace + direct + code cache + stacks)
              # heap 4G → 5.5Gi. Si tu baisses MEMORY à 3G, remets 4Gi.
              memory: "5500Mi"   # synced with .env MAIN_MEMORY (4G × 1.35)
              cpu: "2000m"
          # Probes — Purpur 1.21 + plugins = 90-120s au 1er boot.
          # On tolère jusqu'à 180s + 3 échecs avant liveness kill.
          readinessProbe:
            exec: { command: ["mc-health"] }
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec: { command: ["mc-health"] }
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
            # ConfigMap mineshark-paper-config (généré par `make secrets`)
            # monte les YAML de tuning au 1er boot — itzg les copie dans /data.
            - name: server-config
              mountPath: /config
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: server-main-pvc
        - name: server-config
          configMap:
            name: mineshark-paper-config
            optional: true          # tolère l'absence en dev, utile en CI dry-run
        # ─── Jars plugins "à la main" (workflow plugins/manual/) ────────
        # hostPath (et pas ConfigMap) pour 3 raisons :
        #   1) Limite ConfigMap = 1 MiB total → un seul jar peut dépasser.
        #   2) K3s mono-noeud → pas de problème de scheduling multi-host.
        #   3) Contenu géré hors git (jars payants), committer un
        #      ConfigMap binaire serait moche.
        # `make plugins-sync` rsync plugins/manual/*.jar → ce chemin sur VPS.
        # Le initContainer `copy-manual-plugins` les copie dans /data/plugins/.
        # type: DirectoryOrCreate → k3s crée le dir au 1er boot si absent.
        - name: manual-plugins
          hostPath:
            path: /var/lib/mineshark/manual-plugins
            type: DirectoryOrCreate
        # ─── Addons BentoBox (workflow plugins/manual/bentobox-addons/) ──
        # Les addons BentoBox (AOneBlock, Level, etc.) ne sont PAS des
        # plugins Bukkit classiques : ils doivent être posés dans
        # `plugins/BentoBox/addons/` pour être détectés. Sous-répertoire
        # dédié côté repo (`plugins/manual/bentobox-addons/*.jar`),
        # rsync-é sur VPS dans `/var/lib/mineshark/manual-bentobox-addons/`,
        # copié par l'initContainer dans `/data/plugins/BentoBox/addons/`.
        - name: manual-bentobox-addons
          hostPath:
            path: /var/lib/mineshark/manual-bentobox-addons
            type: DirectoryOrCreate