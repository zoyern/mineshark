# ═══════════════════════════════════════════════════════════════════
#  Deployment mc-main (serveur Paper — lobby + survie)
# ═══════════════════════════════════════════════════════════════════
#  Aligné avec docker-compose.yml service `main-paper`.
#  Toute valeur en dur ici est marquée « synced with .env <VAR> ».
#  Si tu changes la VAR dans .env, change ici aussi.
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mc-main
  namespace: mineshark
  labels:
    app: mc-main
    component: server
spec:
  replicas: 1
  strategy:
    type: Recreate          # PVC RWO + Minecraft monothread → pas de rolling
  selector:
    matchLabels:
      app: mc-main
  template:
    metadata:
      labels:
        app: mc-main
        component: server
    spec:
      containers:
        - name: minecraft
          image: itzg/minecraft-server:java21    # synced with .env IMG_SERVER
          env:
            - name: EULA
              value: "TRUE"
            - name: TYPE
              value: PAPER
            - name: VERSION
              value: "1.21.4"                    # synced with .env PAPER_VERSION
            - name: MEMORY
              value: "3G"                        # synced with .env MAIN_MEMORY
            - name: USE_AIKAR_FLAGS
              value: "true"

            # Velocity authentifie ; ce backend trust le proxy via secret
            - name: ONLINE_MODE
              value: "FALSE"
            - name: PAPER_VELOCITY_SECRET
              valueFrom:
                secretKeyRef:
                  name: velocity-forwarding-secret
                  key: forwarding-secret

            - name: MOTD
              value: "§b§lMineShark §7- §aSurvie & Lobby"   # synced with .env MAIN_MOTD
            - name: MAX_PLAYERS
              value: "50"                                   # synced with .env MAIN_MAX_PLAYERS
            - name: DIFFICULTY
              value: "normal"                               # synced with .env DIFFICULTY_MAIN
            - name: SPAWN_PROTECTION
              value: "16"

            - name: VIEW_DISTANCE
              value: "8"                                    # synced with .env VIEW_DISTANCE
            - name: SIMULATION_DISTANCE
              value: "5"                                    # synced with .env SIMULATION_DISTANCE
            - name: SPAWN_LIMIT
              value: "40"

            - name: ENABLE_RCON
              value: "TRUE"
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rcon-secret
                  key: rcon-password

            # Plugins via Modrinth — résolution automatique des versions
            - name: MODRINTH_PROJECTS
              value: "floodgate,luckperms,worldedit,worldguard,coreprotect,multiverse-core,placeholderapi,spark,chunky,decent-holograms"   # synced with .env PLUGINS_MODRINTH
            # Floodgate : pas sur Modrinth → URL directe GeyserMC
            - name: PLUGINS
              value: "https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot"

          ports:
            - containerPort: 25565
              name: minecraft
            - containerPort: 25575
              name: rcon
          resources:
            requests:
              memory: "1500Mi"
              cpu: "500m"
            limits:
              memory: "4Gi"      # = MAIN_MEMORY (3G) + 30% marge JVM
              cpu: "2000m"
          readinessProbe:
            exec: { command: ["mc-health"] }
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            exec: { command: ["mc-health"] }
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: server-main-pvc
