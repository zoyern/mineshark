# ═══════════════════════════════════════════════════════════════════
#  ConfigMap velocity-config
# ═══════════════════════════════════════════════════════════════════
#  Ce fichier est une COPIE de config/velocity.toml.
#
#  Pour synchroniser après modif de config/velocity.toml :
#    make sync-velocity-config
#
#  Cette commande lance :
#    kubectl create configmap velocity-config \
#      --from-file=velocity.toml=config/velocity.toml \
#      --namespace=mineshark --dry-run=client -o yaml | kubectl apply -f -
#
#  Le YAML committé ci-dessous est la version de référence pour le clone
#  initial (avant que `make secrets` ne le régénère).
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: velocity-config
  namespace: mineshark
  labels:
    app: velocity
data:
  velocity.toml: |
    # Voir config/velocity.toml — fichier source.
    # Sera écrasé par `make sync-velocity-config`.
    config-version = "2.7"
    bind = "0.0.0.0:25577"
    motd = "<bold><aqua>MineShark</aqua></bold> <gray>-</gray> <green>En ligne</green>"
    show-max-players = 100
    online-mode = true
    force-key-authentication = true
    player-info-forwarding-mode = "modern"
    [servers]
      main = "mc-main:25565"
      mod  = "mc-mod:25565"
      try = ["main"]
    [forced-hosts]
    [advanced]
      compression-threshold = 256
      compression-level = -1
      login-ratelimit = 3000
      connection-timeout = 5000
      read-timeout = 30000
      haproxy-protocol = false
      tcp-fast-open = false
      bungee-plugin-message-channel = true
      show-ping-requests = false
      failover-on-unexpected-server-disconnect = true
      announce-proxy-commands = true
      log-command-executions = false
      log-player-connections = true
    [query]
      enabled = false
      port = 25577
