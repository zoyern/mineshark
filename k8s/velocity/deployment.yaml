# ═══════════════════════════════════════════════════════════════════
#  Deployment velocity (proxy)
# ═══════════════════════════════════════════════════════════════════
#  Différences notables vs Docker Compose :
#    • Plugins téléchargés par un initContainer (pattern K8s
#      idiomatique) plutôt que via la variable PLUGINS de itzg.
#      Avantage : on peut cacher dans le PVC et éviter de
#      re-télécharger à chaque rebuild du pod (test if exists).
#    • velocity.toml provient d'une ConfigMap (cf. configmap.yaml)
#      copiée vers le PVC writable au boot (Velocity réécrit certaines
#      sections au démarrage, donc pas de mount read-only direct).
#
#  Image pinnée : voir .env (IMG_PROXY). À synchroniser manuellement.
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: velocity
  namespace: mineshark
  labels:
    app: velocity
    component: proxy
spec:
  replicas: 1
  strategy:
    type: Recreate          # un seul proxy : pas de rolling, on coupe puis on relance
  selector:
    matchLabels:
      app: velocity
  template:
    metadata:
      labels:
        app: velocity
        component: proxy
    spec:
      # Sécurité pod-level : non-root (initContainers + container inclus)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:

        # 1. Télécharge les plugins (idempotent : skip si déjà présent)
        - name: download-plugins
          image: busybox:1.36.1            # synced with .env IMG_BUSYBOX
          command: ["sh", "-c"]
          args:
            - |
              set -e
              mkdir -p /server/plugins
              cd /server/plugins

              # Helper : télécharge si absent ou plus vieux que 30 jours
              fetch() {
                local out=$1 url=$2
                if [ ! -f "$out" ]; then
                  echo ">> télécharge $out"
                  wget -q -O "$out" "$url"
                else
                  echo "✓ $out déjà présent (skip)"
                fi
              }

              fetch Geyser-Velocity.jar     "https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/velocity"
              fetch Floodgate-Velocity.jar  "https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/velocity"
              fetch ViaVersion.jar          "https://github.com/ViaVersion/ViaVersion/releases/download/5.8.0/ViaVersion-5.8.0.jar"
              fetch ViaBackwards.jar        "https://github.com/ViaVersion/ViaBackwards/releases/download/5.8.1/ViaBackwards-5.8.1.jar"

              echo "── Plugins prêts :"
              ls -la /server/plugins/
          volumeMounts:
            - name: velocity-data
              mountPath: /server

        # 2. Copie velocity.toml depuis la ConfigMap + écrit le forwarding
        #    secret dans le PVC (pour que le proxy et les backends partagent
        #    LE MÊME secret — critique pour l'auth en mode "modern").
        - name: copy-config
          image: busybox:1.36.1
          command: ["sh", "-c"]
          args:
            - |
              set -e
              cp /config/velocity.toml /server/velocity.toml
              # Velocity lit le secret depuis /server/forwarding.secret.
              # On écrase toujours pour garantir la cohérence avec les backends.
              cp /secret/forwarding-secret /server/forwarding.secret
              chmod 600 /server/forwarding.secret
              echo "✓ velocity.toml + forwarding.secret synchronisés"
          volumeMounts:
            - name: velocity-config
              mountPath: /config
            - name: velocity-forwarding
              mountPath: /secret
              readOnly: true
            - name: velocity-data
              mountPath: /server

      containers:
        - name: velocity
          image: itzg/mc-proxy:java21      # synced with .env IMG_PROXY
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: TYPE
              value: VELOCITY
            - name: MEMORY
              value: "512m"                # synced with .env PROXY_MEMORY
            - name: SERVER_PORT
              value: "25577"
          ports:
            - containerPort: 25577
              name: mc-java
              protocol: TCP
            - containerPort: 19132
              name: mc-bedrock
              protocol: UDP
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              # Règle : limit = MEMORY + 30% (marge metaspace + off-heap JVM)
              memory: "700Mi"
              cpu: "500m"
          readinessProbe:
            tcpSocket: { port: 25577 }
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 25577 }
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: velocity-data
              mountPath: /server

      volumes:
        - name: velocity-config
          configMap:
            name: velocity-config
        - name: velocity-forwarding
          secret:
            secretName: velocity-forwarding-secret
            defaultMode: 0400
        - name: velocity-data
          persistentVolumeClaim:
            claimName: server-proxy-pvc
