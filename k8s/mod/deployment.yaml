# ═══════════════════════════════════════════════════════════════════
#  Deployment mc-mod (serveur moddé NeoForge — opt-in, STANDALONE)
# ═══════════════════════════════════════════════════════════════════
#  Démarré à replicas=0 par défaut. Activation : `make mod-on`.
#
#  Standalone = pas derrière Velocity :
#    • ONLINE_MODE=TRUE (auth Mojang directe depuis le client)
#    • Pas de PAPER_VELOCITY_SECRET
#    • Port public propre via Service LoadBalancer (PORT_MOD, défaut 25566)
#  Raison : Velocity force un protocole qui casse NeoForge.
#
#  MODPACK ACTUEL : "Modded Together" 1.2.4, 1.21.1 NeoForge
#    • pack fantasy/exploration, prévu pour Mass Multiplayer + Co-Op
#    • CurseForge : https://www.curseforge.com/minecraft/modpacks/moddedtogether
#    • 8 Go RAM suffisent pour 5-10 joueurs
#
#  PIÈGE VÉCU : CF_EXCLUDE_MODS attend des slugs CurseForge EXACTS
#  (= la FIN de l'URL curseforge.com/minecraft/mc-mods/<slug>).
#  itzg IGNORE SILENCIEUSEMENT les slugs inconnus. Bien vérifier sur CF.
#  Cas particulier pour Modded Together (3 mods client-only à exclure) :
#    • Substrate        → slug CF = `substrate-add-on` (pas `substrate` !)
#    • Particle Core    → slug CF = `particle-core`
#    • Pretty Rain      → slug CF = `pretty-rain`
#  Le mod Modrinth s'appelle souvent différemment du slug CF — toujours
#  prendre la version CF.
#
#  ALTERNATIVES TESTÉES (modifier MODPACK_SLUG + MOD_MEMORY dans .env) :
#    • moddedtogether        → Modded Together, fantasy, 8 Go (actuel)
#    • all-the-mods-10       → ATM10, kitchen-sink géant (~500 mods), 10 Go
#    • cobblemon-neoforge    → Cobblemon officiel (Pokemon-like), 3 Go
#    • medieval-mc-mmc5      → Medieval MC MMC5 (RPG médiéval), 6 Go
#
#  Pour CHANGER de modpack :
#    1. Édite MODPACK_SLUG et MOD_MEMORY dans .env
#    2. Mets à jour CF_SLUG + MEMORY ci-dessous (synced with .env)
#    3. Revois CF_EXCLUDE_MODS (vider si pack propre type ATM10)
#    4. `make mod-reset && make mod-on` (efface le PVC, retélécharge le pack)
#
#  Démarrage attendu : 3 à 5 min (download modpack + génération monde).
#  Probes calibrées en conséquence.
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mc-mod
  namespace: mineshark
  labels:
    app: mc-mod
    component: server
spec:
  replicas: 0                 # opt-in : `make mod-on` passe à 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mc-mod
  template:
    metadata:
      labels:
        app: mc-mod
        component: server
    spec:
      # Sécurité pod-level : non-root partout
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      # NB : pas d'initContainer perf-mods ici.
      # Modded Together n'embarque pas de fork Lithium côté serveur, mais
      # injecter Lithium/ServerCore ajoute des risques de conflit mixin
      # avec Quark/Create. À ré-évaluer si les TPS souffrent en prod.
      containers:
        - name: minecraft
          image: itzg/minecraft-server:java21      # synced with .env IMG_SERVER
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: EULA
              value: "TRUE"
            - name: TYPE
              value: "AUTO_CURSEFORGE"             # synced with .env MODPACK_TYPE
            - name: CF_SLUG
              value: "moddedtogether"              # synced with .env MODPACK_SLUG
            - name: CF_API_KEY
              valueFrom:
                secretKeyRef:
                  name: curseforge-api-key
                  key: api-key
            # ─── Mods client-only exclus du pack (slugs CurseForge exacts) ──
            # Vérification faite via les URLs officielles :
            #   curseforge.com/minecraft/mc-mods/substrate-add-on
            #   curseforge.com/minecraft/mc-mods/particle-core
            #   curseforge.com/minecraft/mc-mods/pretty-rain
            # Ces 3 mods référencent des classes client-only (KeyMapping,
            # Screen, ParticleStatus) et crash le dedicated server au boot.
            # Si un boot échoue encore sur un 4e mod client-only, ajouter
            # son slug ici en respectant EXACTEMENT l'URL CurseForge.
            - name: CF_EXCLUDE_MODS
              value: "substrate-add-on,particle-core,pretty-rain"
            # CLÉ DU FIX : sans CF_FORCE_SYNCHRONIZE=true, itzg ne re-évalue
            # PAS CF_EXCLUDE_MODS entre les boots. Les jars client-only déjà
            # présents dans le PVC (téléchargés lors d'un boot antérieur)
            # restent en place → crash à l'init Substrate/ParticleCore.
            # Avec true, itzg re-compare le manifest CF avec /data/mods/ à
            # chaque boot et supprime les jars qui matchent CF_EXCLUDE_MODS.
            # Coût : ~5-10s de re-check par boot (pas de re-download si les
            # hashes matchent, juste validation). Acceptable.
            - name: CF_FORCE_SYNCHRONIZE
              value: "true"
            # Défense en profondeur : même si CF_EXCLUDE_MODS rate un slug,
            # REMOVE_OLD_MODS scanne /data/mods/ au boot et purge ces jars.
            # Matche par nom de fichier (wildcards glob), profondeur 2 pour
            # attraper aussi les JarJar extraits dans des sous-dossiers.
            # ⚠️ REMOVE_OLD_MODS s'exécute AVANT AUTO_CURSEFORGE, donc il
            # ne protège que contre les reliquats. Le vrai filtre, c'est
            # CF_EXCLUDE_MODS + CF_FORCE_SYNCHRONIZE ci-dessus.
            - name: REMOVE_OLD_MODS
              value: "TRUE"
            - name: REMOVE_OLD_MODS_INCLUDE
              value: "substrate-*.jar,particle_core-*.jar,particle-core-*.jar,Pretty*Rain*.jar,pretty-rain-*.jar"
            - name: REMOVE_OLD_MODS_DEPTH
              value: "2"

            # ─── Mods additionnels via Modrinth ────────────────────────────
            # itzg accepte MODRINTH_PROJECTS EN PLUS de AUTO_CURSEFORGE :
            # le modpack CF est extrait puis les mods Modrinth sont copiés
            # dans /data/mods/ par-dessus. Les loaders (NeoForge) mergent.
            #
            # chunky : pré-générateur de chunks (commande /chunky). Évite
            # les freezes quand les joueurs explorent de nouvelles zones
            # (la gen worldgen NeoForge est ×3-5 plus lourde que vanilla
            # à cause des biomes/structures modés). Lance une fois après
            # le 1er boot :
            #   make rcon-mod
            #   > chunky radius 2000
            #   > chunky start overworld
            # Laisse tourner ~1h (selon CPU), puis `chunky cancel`.
            # Slug Modrinth `chunky` = même maintainer que la version
            # Paper (pop4959), support NeoForge 1.21.1 confirmé.
            - name: MODRINTH_PROJECTS
              value: "chunky"

            - name: MEMORY
              value: "6G"                          # synced with .env MOD_MEMORY
            # Pourquoi 6G et pas 8G ? VPS Netcup = 16Go physique.
            # Budget si mc-main + mc-mod + velocity + system simultanément :
            #   system + K3s     ~1.5Gi
            #   velocity         ~1Gi
            #   mc-main limit    5.5Gi  (heap 4G × 1.35)
            #   mc-mod  limit    8Gi    (heap 6G × 1.33)  ← ici
            #   ──────────────────────
            #   Total           ~16Gi → marge ~0.5-1Gi
            # Passer à 8G heap / 10Gi limit sommerait à 18Gi → kernel
            # OOMkiller quand les 2 pods tirent au max. Modded Together
            # recommande 8G pour 5-10 joueurs ; 6G tient avec 3-6 joueurs
            # actifs + SIMULATION_DISTANCE=5. Au-delà : bumper le VPS.
            - name: USE_AIKAR_FLAGS
              value: "true"
            # Safety net : sans flight, la mort = ghost qui flotte puis kick.
            # Les mods de mobilité (jetpacks, bottes élytres) en ont besoin.
            - name: ALLOW_FLIGHT
              value: "TRUE"
            # Standalone : le client s'authentifie directement auprès de Mojang
            - name: ONLINE_MODE
              value: "TRUE"

            - name: MOTD
              value: "§b§lMineShark §7- §cModdé"   # synced with .env MOD_MOTD
            - name: MAX_PLAYERS
              value: "30"                          # synced with .env MOD_MAX_PLAYERS
            - name: DIFFICULTY
              value: "hard"                        # synced with .env DIFFICULTY_MOD

            - name: VIEW_DISTANCE
              value: "8"                           # synced with .env VIEW_DISTANCE
            - name: SIMULATION_DISTANCE
              value: "5"                           # synced with .env SIMULATION_DISTANCE

            - name: ENABLE_RCON
              value: "TRUE"
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rcon-secret
                  key: rcon-password
          ports:
            - containerPort: 25565
              name: minecraft
            - containerPort: 25575
              name: rcon
          resources:
            requests:
              memory: "5Gi"     # réserve ferme en dessous du heap (pod schedulable)
              cpu: "1000m"
            limits:
              memory: "8Gi"     # = MOD_MEMORY (6G) × 1.33 (metaspace + direct + off-heap)
              cpu: "4000m"
          # Modded Together : 1er boot ~3-5 min (download ~500 Mo + gen monde).
          # Boots suivants ~1-2 min. Probes tolérantes.
          readinessProbe:
            exec: { command: ["mc-health"] }
            initialDelaySeconds: 180      # 3 min avant 1re check
            periodSeconds: 15
            failureThreshold: 8
          livenessProbe:
            exec: { command: ["mc-health"] }
            initialDelaySeconds: 300      # 5 min avant 1re check
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: server-mod-pvc
