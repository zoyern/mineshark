# ═══════════════════════════════════════════════════════════════════
#  Deployment mc-mod (serveur moddé NeoForge — opt-in, STANDALONE)
# ═══════════════════════════════════════════════════════════════════
#  Démarré à replicas=0 par défaut. Activation : `make mod-on`.
#
#  Standalone = pas derrière Velocity :
#    • ONLINE_MODE=TRUE (auth Mojang directe depuis le client)
#    • Pas de PAPER_VELOCITY_SECRET
#    • Port public propre via Service LoadBalancer (PORT_MOD, défaut 25566)
#  Raison : Velocity force un protocole qui casse NeoForge.
#
#  MODPACK ACTUEL : "Modded Together" 1.2.4, 1.21.1 NeoForge
#    • pack fantasy/exploration, prévu pour Mass Multiplayer + Co-Op
#    • CurseForge : https://www.curseforge.com/minecraft/modpacks/moddedtogether
#    • 8 Go RAM suffisent pour 5-10 joueurs
#
#  PIÈGE VÉCU : CF_EXCLUDE_MODS attend des slugs CurseForge EXACTS
#  (= la FIN de l'URL curseforge.com/minecraft/mc-mods/<slug>).
#  itzg IGNORE SILENCIEUSEMENT les slugs inconnus. Bien vérifier sur CF.
#  Cas particulier pour Modded Together (3 mods client-only à exclure) :
#    • Substrate        → slug CF = `substrate-add-on` (pas `substrate` !)
#    • Particle Core    → slug CF = `particle-core`
#    • Pretty Rain      → slug CF = `pretty-rain`
#  Le mod Modrinth s'appelle souvent différemment du slug CF — toujours
#  prendre la version CF.
#
#  ALTERNATIVES TESTÉES (modifier MODPACK_SLUG + MOD_MEMORY dans .env) :
#    • moddedtogether        → Modded Together, fantasy, 8 Go (actuel)
#    • all-the-mods-10       → ATM10, kitchen-sink géant (~500 mods), 10 Go
#    • cobblemon-neoforge    → Cobblemon officiel (Pokemon-like), 3 Go
#    • medieval-mc-mmc5      → Medieval MC MMC5 (RPG médiéval), 6 Go
#
#  Pour CHANGER de modpack :
#    1. Édite MODPACK_SLUG et MOD_MEMORY dans .env
#    2. Mets à jour CF_SLUG + MEMORY ci-dessous (synced with .env)
#    3. Revois CF_EXCLUDE_MODS (vider si pack propre type ATM10)
#    4. `make mod-reset && make mod-on` (efface le PVC, retélécharge le pack)
#
#  Démarrage attendu : 3 à 5 min (download modpack + génération monde).
#  Probes calibrées en conséquence.
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mc-mod
  namespace: mineshark
  labels:
    app: mc-mod
    component: server
spec:
  replicas: 0                 # opt-in : `make mod-on` passe à 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mc-mod
  template:
    metadata:
      labels:
        app: mc-mod
        component: server
    spec:
      # Sécurité pod-level : non-root partout
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      # NB : pas d'initContainer perf-mods ici.
      # Modded Together n'embarque pas de fork Lithium côté serveur, mais
      # injecter Lithium/ServerCore ajoute des risques de conflit mixin
      # avec Quark/Create. À ré-évaluer si les TPS souffrent en prod.
      #
      # ─── Config discord_chat_mod : Secret → PVC via initContainer ─────
      # Le TOML complet (rendu depuis k8s/mod/discord_chat_mod-common.toml.tpl
      # par `make discord-setup`) vit dans le Secret `discord-chat-mod-toml`.
      # Un initContainer le copie dans le PVC à /data/config/ à CHAQUE boot
      # → le mod lit/écrit normalement, nos valeurs canoniques sont
      # ré-injectées à chaque démarrage.
      #
      # Historique debug 2026-04-21 :
      #   1. V1 : initContainer sed patchait le TOML après le boot. NeoForge
      #      normalisait le format et wipait les valeurs → "Token may not
      #      be empty". Indent TAB vs 8 spaces mal géré par busybox sed.
      #   2. V2 : Secret monté subPath READ-ONLY. Bloquait NeoForge OK, mais
      #      discord_chat_mod v2.6.2 fait lui-même un autosave au load
      #      (ConfigManager.removeDeprecatedParameters → night-config
      #      AutosaveCommentedFileConfig.remove()) → FileSystemException:
      #      Read-only file system. Les volumes Secret K8s sont readOnly au
      #      niveau kernel, pas contournable.
      #   3. V3 (actuelle) : initContainer busybox cp Secret → PVC. Le mod
      #      peut autosave. Valeurs ré-injectées au prochain boot si un
      #      rewrite les bouffe. Avec template en TAB-indent canonique, le
      #      risque de rewrite NeoForge est faible.
      initContainers:
        # Injecte le TOML canonique du Secret discord-chat-mod-toml dans le
        # PVC avant le boot de mc-image-helper. `cp -f` → idempotent, chaque
        # boot part d'un état propre. Si le Secret n'existe pas → initContainer
        # stuck en ContainerCreating → `make discord-setup` avant `make mod-on`.
        - name: discord-toml-install
          image: busybox:1.36
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - |
              set -e
              echo "[discord-toml-install] Préparation du dossier config..."
              mkdir -p /data/config
              echo "[discord-toml-install] Nettoyage des anciennes configs bloquantes..."
              rm -f /data/config/discord_chat_mod-common.toml || true
              echo "[discord-toml-install] Création du nouveau fichier config (RW)..."
              cat /discord-toml/discord_chat_mod-common.toml > /data/config/discord_chat_mod-common.toml
              chmod 644 /data/config/discord_chat_mod-common.toml
              echo "[discord-toml-install] Canonical TOML injected → /data/config/discord_chat_mod-common.toml"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: discord-toml
              mountPath: /discord-toml
              readOnly: true
      containers:
        - name: minecraft
          image: itzg/minecraft-server:java21      # synced with .env IMG_SERVER
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: EULA
              value: "TRUE"
            - name: TYPE
              value: "AUTO_CURSEFORGE"             # synced with .env MODPACK_TYPE
            - name: CF_SLUG
              value: "moddedtogether"              # synced with .env MODPACK_SLUG
            - name: CF_API_KEY
              valueFrom:
                secretKeyRef:
                  name: curseforge-api-key
                  key: api-key
            # ─── Mods client-only exclus du pack (slugs CurseForge exacts) ──
            # Vérification faite via les URLs officielles :
            #   curseforge.com/minecraft/mc-mods/substrate-add-on
            #   curseforge.com/minecraft/mc-mods/particle-core
            #   curseforge.com/minecraft/mc-mods/pretty-rain
            # Ces 3 mods référencent des classes client-only (KeyMapping,
            # Screen, ParticleStatus) et crash le dedicated server au boot.
            # Si un boot échoue encore sur un 4e mod client-only, ajouter
            # son slug ici en respectant EXACTEMENT l'URL CurseForge.
            - name: CF_EXCLUDE_MODS
              value: "substrate-add-on,particle-core,pretty-rain"
            # CLÉ DU FIX : sans CF_FORCE_SYNCHRONIZE=true, itzg ne re-évalue
            # PAS CF_EXCLUDE_MODS entre les boots. Les jars client-only déjà
            # présents dans le PVC (téléchargés lors d'un boot antérieur)
            # restent en place → crash à l'init Substrate/ParticleCore.
            # Avec true, itzg re-compare le manifest CF avec /data/mods/ à
            # chaque boot et supprime les jars qui matchent CF_EXCLUDE_MODS.
            # Coût : ~5-10s de re-check par boot (pas de re-download si les
            # hashes matchent, juste validation). Acceptable.
            - name: CF_FORCE_SYNCHRONIZE
              value: "true"
            # ⚠️ CONFLIT overrides du modpack vs. TOML pré-injecté.
            # Le modpack Modded Together contient dans ses overrides un
            # `config/discord_chat_mod-common.toml` par défaut (token vide).
            # Au boot, mc-image-helper extrait le zip et tente de copier ce
            # fichier par-dessus celui que notre initContainer vient
            # d'injecter depuis le Secret. Sans exclusion, notre token
            # disparaît → JDA "Token may not be empty" au load du mod.
            # CF_OVERRIDES_EXCLUSIONS dit à itzg de *skip* ce fichier lors
            # de l'application des overrides. Notre version (rendue depuis
            # le template, contenant le vrai token) reste intacte.
            # Glob relatif à la racine du zip (= même path que sous /data/).
            - name: CF_OVERRIDES_EXCLUSIONS
              value: "config/discord_chat_mod-common.toml"
            # Défense en profondeur : même si CF_EXCLUDE_MODS rate un slug,
            # REMOVE_OLD_MODS scanne /data/mods/ au boot et purge ces jars.
            # Matche par nom de fichier (wildcards glob), profondeur 2 pour
            # attraper aussi les JarJar extraits dans des sous-dossiers.
            # ⚠️ REMOVE_OLD_MODS s'exécute AVANT AUTO_CURSEFORGE, donc il
            # ne protège que contre les reliquats. Le vrai filtre, c'est
            # CF_EXCLUDE_MODS + CF_FORCE_SYNCHRONIZE ci-dessus.
            - name: REMOVE_OLD_MODS
              value: "TRUE"
            - name: REMOVE_OLD_MODS_INCLUDE
              value: "substrate-*.jar,particle_core-*.jar,particle-core-*.jar,Pretty*Rain*.jar,pretty-rain-*.jar"
            - name: REMOVE_OLD_MODS_DEPTH
              value: "2"

            # ─── Mods additionnels via Modrinth (UNIVERSELS) ───────────────
            # itzg accepte MODRINTH_PROJECTS EN PLUS de AUTO_CURSEFORGE :
            # le modpack CF est extrait puis les mods Modrinth sont copiés
            # dans /data/mods/ par-dessus. Les loaders (NeoForge) mergent.
            # Ces mods sont donc présents QUEL QUE SOIT le modpack CF.
            #
            # chunky : pré-générateur de chunks (commande /chunky). Évite
            # les freezes quand les joueurs explorent de nouvelles zones
            # (la gen worldgen NeoForge est ×3-5 plus lourde que vanilla
            # à cause des biomes/structures modés). Lance une fois après
            # le 1er boot :
            #   make rcon-mod
            #   > chunky radius 2000
            #   > chunky start overworld
            # Laisse tourner ~1h (selon CPU), puis `chunky cancel`.
            # Slug Modrinth `chunky` = même maintainer que la version
            # Paper (pop4959), support NeoForge 1.21.1 confirmé.
            #
            # discord-chat-connect : bridge tchat in-game ↔ salon Discord.
            # Serveur-side uniquement (pas de client requis). Auteur :
            # denisnumb (https://modrinth.com/mod/discord-chat-connect).
            # ⚠️ Le slug Modrinth est `discord-chat-connect`, PAS
            # `discord-chat-mod` (nom affiché = "Discord & Chat Images",
            # ancien nom CurseForge = discord-chat-mod). Se tromper de
            # slug = `Project(s) could not be located` + crash loop du
            # pod. Toujours vérifier sur modrinth.com/mod/<slug>.
            # Config lue depuis /data/config/discord_chat_mod-common.toml.
            # Ce fichier est injecté dans le PVC par l'initContainer
            # `discord-toml-install` depuis le Secret `discord-chat-mod-toml`
            # à chaque boot. Le Secret est rendu par `make discord-setup`
            # depuis le template k8s/mod/discord_chat_mod-common.toml.tpl.
            # Si le Secret est absent → initContainer stuck en
            # ContainerCreating. Lance `make discord-setup` avant `make mod-on`.
            - name: MODRINTH_PROJECTS
              value: "chunky,discord-chat-connect"

            - name: MEMORY
              value: "8G"                          # synced with .env MOD_MEMORY
            # Pourquoi 6G et pas 8G ? VPS Netcup = 16Go physique.
            # Budget si mc-main + mc-mod + velocity + system simultanément :
            #   system + K3s     ~1.5Gi
            #   velocity         ~1Gi
            #   mc-main limit    5.5Gi  (heap 4G × 1.35)
            #   mc-mod  limit    8Gi    (heap 6G × 1.33)  ← ici
            #   ──────────────────────
            #   Total           ~16Gi → marge ~0.5-1Gi
            # Passer à 8G heap / 10Gi limit sommerait à 18Gi → kernel
            # OOMkiller quand les 2 pods tirent au max. Modded Together
            # recommande 8G pour 5-10 joueurs ; 6G tient avec 3-6 joueurs
            # actifs + SIMULATION_DISTANCE=5. Au-delà : bumper le VPS.
            - name: USE_AIKAR_FLAGS
              value: "false"
            - name: JVM_OPTS
              value: "-XX:+UseZGC -XX:+ZGenerational"
            - name: MAX_TICK_TIME
              value: "-1"
            - name: NETWORK_TIMEOUT
              value: "120000" # 120 secondes d'attente au lieu des 30 par défaut
            # Safety net : sans flight, la mort = ghost qui flotte puis kick.
            # Les mods de mobilité (jetpacks, bottes élytres) en ont besoin.
            - name: ALLOW_FLIGHT
              value: "TRUE"
            # Standalone : le client s'authentifie directement auprès de Mojang
            - name: ONLINE_MODE
              value: "TRUE"

            - name: MOTD
              value: "§b§lMineShark §7- §cModdé"   # synced with .env MOD_MOTD
            - name: MAX_PLAYERS
              value: "30"                          # synced with .env MOD_MAX_PLAYERS
            - name: DIFFICULTY
              value: "normal"                        # synced with .env DIFFICULTY_MOD
            - name: PVP
              value: "true"

            - name: VIEW_DISTANCE
              value: "8"                           # synced with .env VIEW_DISTANCE
            - name: SIMULATION_DISTANCE
              value: "5"                           # synced with .env SIMULATION_DISTANCE

            - name: ENABLE_RCON
              value: "TRUE"
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rcon-secret
                  key: rcon-password
          ports:
            - containerPort: 25565
              name: minecraft
            - containerPort: 25575
              name: rcon
          resources:
            requests:
              memory: "5Gi"     # réserve ferme en dessous du heap (pod schedulable)
              cpu: "2000m"
            limits:
              memory: "14Gi"     # = MOD_MEMORY (6G) × 1.33 (metaspace + direct + off-heap)
              cpu: "7000m"
          # Modded Together : 1er boot ~3-5 min (download ~500 Mo + gen monde).
          # Boots suivants ~1-2 min. Probes tolérantes.
          readinessProbe:
            exec: { command: ["mc-health"] }
            initialDelaySeconds: 60      # 5 min avant 1re check
            periodSeconds: 10
            failureThreshold: 60
          livenessProbe:
            exec: { command: ["mc-health"] }
            initialDelaySeconds: 120      # 5 min avant 1re check
            periodSeconds: 20
            failureThreshold: 15
          # Pas de mount du Secret dans le container principal : le TOML a
          # déjà été copié dans /data/config/ par l'initContainer
          # discord-toml-install (voir initContainers plus haut). Le mod
          # lit/écrit ce fichier via le PVC (RW), ce qui est nécessaire
          # pour son autosave interne au load (removeDeprecatedParameters).
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: server-mod-pvc
        # Secret contenant le TOML complet rendu par `make discord-setup`.
        # Consommé UNIQUEMENT par l'initContainer discord-toml-install qui
        # copie son contenu dans le PVC. Pas monté dans le container
        # principal (sinon le mod rencontre un mount readOnly incompatible
        # avec son autosave night-config).
        - name: discord-toml
          secret:
            secretName: discord-chat-mod-toml
            items:
              - key: discord_chat_mod-common.toml
                path: discord_chat_mod-common.toml
