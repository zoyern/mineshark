# ═══════════════════════════════════════════════════════════════════
#  Deployment mc-mod (serveur moddé NeoForge — opt-in, STANDALONE)
# ═══════════════════════════════════════════════════════════════════
#  Démarré à replicas=0 par défaut. Activation : `make mod-on`.
#
#  Standalone = pas derrière Velocity :
#    • ONLINE_MODE=TRUE (auth Mojang directe depuis le client)
#    • Pas de PAPER_VELOCITY_SECRET
#    • Port public propre via Service LoadBalancer (PORT_MOD, défaut 25566)
#  Raison : Velocity force un protocole qui casse NeoForge.
#
#  Pour CHANGER de modpack :
#    1. Modifier MODPACK_SLUG dans .env
#    2. Mettre à jour la valeur CF_SLUG ci-dessous (synced with .env)
#    3. `make mod-reset`  (efface le PVC, le pack se retéléchargera)
#
#  Démarrage attendu : 3 à 5 min (téléchargement modpack + génération
#  monde initial). Probes calibrées en conséquence.
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mc-mod
  namespace: mineshark
  labels:
    app: mc-mod
    component: server
spec:
  replicas: 0                 # opt-in : `make mod-on` passe à 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mc-mod
  template:
    metadata:
      labels:
        app: mc-mod
        component: server
    spec:
      # Sécurité pod-level : non-root partout
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        # Mods de performance server-side (ajoutés au modpack au boot)
        - name: download-perf-mods
          image: busybox:1.36.1                    # synced with .env IMG_BUSYBOX
          command: ["sh", "-c"]
          args:
            - |
              set -e
              mkdir -p /data/perf-mods
              cd /data/perf-mods

              fetch() {
                local out=$1 url=$2
                if [ ! -f "$out" ]; then
                  wget -q -O "$out" "$url" || echo "⚠️ Échec $out"
                else
                  echo "✓ $out déjà présent"
                fi
              }

              # Lithium     : optimise physique, IA mobs, ticking (+30-50%)
              fetch lithium.jar    "https://cdn.modrinth.com/data/gvQqBUqZ/versions/ZSNsJrPI/lithium-neoforge-mc1.21.1-0.14.3.jar"
              # ServerCore  : caps breeding, login async, view distance dynamique
              fetch servercore.jar "https://cdn.modrinth.com/data/4WWQxlQP/versions/vMbpLobR/servercore-neoforge-1.5.7+1.21.1.jar"

              ls -la /data/perf-mods/
          volumeMounts:
            - name: data
              mountPath: /data

      containers:
        - name: minecraft
          image: itzg/minecraft-server:java21      # synced with .env IMG_SERVER
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: EULA
              value: "TRUE"
            - name: TYPE
              value: "AUTO_CURSEFORGE"             # synced with .env MODPACK_TYPE
            - name: CF_SLUG
              value: "moddedtogether"              # synced with .env MODPACK_SLUG
            - name: CF_API_KEY
              valueFrom:
                secretKeyRef:
                  name: curseforge-api-key
                  key: api-key

            - name: MEMORY
              value: "8G"                          # synced with .env MOD_MEMORY
            - name: USE_AIKAR_FLAGS
              value: "true"
            # Standalone : le client s'authentifie directement auprès de Mojang
            - name: ONLINE_MODE
              value: "TRUE"

            - name: MOTD
              value: "§b§lMineShark §7- §cModdé"   # synced with .env MOD_MOTD
            - name: MAX_PLAYERS
              value: "30"                          # synced with .env MOD_MAX_PLAYERS
            - name: DIFFICULTY
              value: "hard"                        # synced with .env DIFFICULTY_MOD

            - name: VIEW_DISTANCE
              value: "8"                           # synced with .env VIEW_DISTANCE
            - name: SIMULATION_DISTANCE
              value: "5"                           # synced with .env SIMULATION_DISTANCE

            - name: ENABLE_RCON
              value: "TRUE"
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rcon-secret
                  key: rcon-password
          ports:
            - containerPort: 25565
              name: minecraft
            - containerPort: 25575
              name: rcon
          resources:
            requests:
              memory: "6Gi"
              cpu: "1000m"
            limits:
              memory: "10Gi"     # = MOD_MEMORY (8G) + 30% marge
              cpu: "4000m"
          # Modpack lourd : démarre lentement, on est tolérant
          readinessProbe:
            exec: { command: ["mc-health"] }
            initialDelaySeconds: 180
            periodSeconds: 15
          livenessProbe:
            exec: { command: ["mc-health"] }
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: server-mod-pvc
