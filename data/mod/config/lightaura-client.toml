#Dynamic Lighting Mod Configuration
#How often to update dynamic lighting in ticks (1-20, lower = more frequent)
# Default: 2
# Range: 1 ~ 20
updateFrequency = 2
#Default light level for items not specifically defined
# Default: 14
# Range: 1 ~ 15
defaultLightLevel = 14
#How long light persists after the source is removed (in ticks)
# Default: 5
# Range: 1 ~ 100
cleanupDelay = 5
#Custom items and their light levels (format: 'modid:item_name=level')
lightItems = []

[playerLighting]
	#Enable placing light at both player's feet and head for more consistent lighting
	enablePlayerLightingOffsets = true
	#Multiplier for how long player lights persist (higher values make light stay longer)
	# Default: 2
	# Range: 1 ~ 10
	persistentLightDurationMultiplier = 2
	#Enable smooth transitions between different light levels
	enableSmoothTransitions = true
	#Enable enhanced lighting for offhand items to prevent light from turning off during actions
	enhancedOffhandLighting = true

[droppedItemLighting]
	#Enable dynamic lighting for dropped items
	enableDroppedItemLighting = true
	#Radius around player to scan for dropped items that emit light (in blocks)
	# Default: 16
	# Range: 4 ~ 64
	droppedItemScanRadius = 16
	#Multiplier for light level of dropped items (0.5 = half as bright as when held)
	# Default: 1.0
	# Range: 0.1 ~ 1.0
	droppedItemLightMultiplier = 1.0
	#Maximum number of entities that can emit light at once (to prevent performance issues)
	# Default: 50
	# Range: 10 ~ 200
	maxTrackedEntities = 50

[performance]
	#Enable optimized light updates to reduce performance impact
	optimizeLightUpdates = true
	#Only update lights within this distance from the player (in blocks)
	# Default: 32
	# Range: 8 ~ 128
	lightUpdateDistanceCheck = 8
