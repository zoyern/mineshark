[Visuals]
	#Show previews of the blocks while placing them.
	#Disable for better performance on low-end systems.
	showBlockPreviews = true
	#Show block previews only when actively using a build mode.
	#Reduces visual clutter when not building.
	onlyShowBlockPreviewsWhenBuilding = true
	#Show a small transparent block inside each preview to highlight block rotation.
	#Disable if you prefer the classic outline-only preview or want to reduce on-screen effects.
	showMiniBlockPreview = true
	#Don't show individual block previews when placing more than this many blocks.
	#The outline will always be rendered regardless of this setting.
	#Lower values improve performance for large builds.
	# Default: 4096
	# Range: 0 ~ 100000
	maxBlockPreviews = 4096
	#How long it takes for a block to appear when placed in ticks.
	#Set to 0 to disable animation for better performance.
	#20 ticks = 1 second
	# Default: 5
	# Range: 0 ~ 100
	appearAnimationLength = 5
	#How long the break animation is in ticks.
	#Set to 0 to disable animation for better performance.
	#20 ticks = 1 second
	# Default: 10
	# Range: 0 ~ 100
	breakAnimationLength = 10
	#The scale of the ghost block previews.
	#1.0 is full size, 0.5 is half size, etc.
	#Smaller values reduce visual clutter.
	# Default: 0.25
	# Range: 0.05 ~ 1.0
	previewScale = 0.25

#Performance settings for Sophisticated Building.
#Adjust these if experiencing lag or frame drops.
[Performance]
	#Maximum distance in blocks to render block previews.
	#Blocks beyond this distance won't show individual previews.
	#Lower values improve performance for large builds.
	# Default: 64
	# Range: 16 ~ 256
	previewRenderDistance = 64
	#Enable update throttling to reduce CPU usage when idle.
	#When enabled, calculations are skipped if the player hasn't moved.
	#Disable if experiencing issues with preview updates.
	enableUpdateThrottling = true
	#Maximum number of mini block previews to render.
	#Mini previews show block rotation inside the ghost outline.
	#Set to 0 to always show mini previews regardless of count (no limit).
	# Default: 4096
	# Range: 0 ~ 100000
	maxMiniBlockPreviews = 4096
