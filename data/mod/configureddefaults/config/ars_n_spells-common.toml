["Master Toggles"]
#Master control switches for major systems.
#Disabling a master toggle will disable all related features.
#Mana Unification Mode - Controls how Ars Nouveau and Iron's Spellbooks mana systems interact:
#  iss_primary - Iron's Spellbooks mana is the single source (DEFAULT)
#  ars_primary - Ars Nouveau mana is the single source
#  hybrid - Both systems share a unified mana pool
#  separate - Separate pools with dual-cost mechanics
#  disabled - No mana integration at all
mana_unification_mode = "ars_primary"
#Master toggle for all mana unification features
enable_mana_unification = true
#Master toggle for the Resonance system (full mana bonuses)
enable_resonance_system = true
#Master toggle for unified cooldown system
enable_cooldown_system = true
#Master toggle for cross-mod progression system
enable_progression_system = true
#Master toggle for affinity/attunement system
enable_affinity_system = true
#Master toggle for the Cursed Ring LP system (replaces mana with LP when wearing Cursed Ring)
enable_lp_system = true
#Enable debug logging for troubleshooting
debug_mode = false

["Mana Unification"]
#Fine-tune how mana conversion and synchronization works.
#These settings only apply when mana unification is enabled.
#Conversion rate from Ars mana to Iron's mana (1.0 = 1:1)
# Default: 1.0
# Range: 0.01 ~ 100.0
conversion_rate_ars_to_iron = 1.0
#Conversion rate from Iron's mana to Ars mana (1.0 = 1:1)
# Default: 1.0
# Range: 0.01 ~ 100.0
conversion_rate_iron_to_ars = 0.5
#How often hybrid pools sync (in ticks, 20 = 1 second)
# Default: 1.0
# Range: 0.1 ~ 10.0
hybrid_sync_rate = 1.0
#Which mana bar to display in HYBRID mode:
#  irons - Show Iron's Spellbooks mana bar
#  ars - Show Ars Nouveau mana bar
#Only applies when mana_unification_mode is set to 'hybrid'
hybrid_mana_bar = "irons"
#Allow mana to overflow max capacity during conversion
allow_mana_overflow = false
#Percentage of Ars mana cost in SEPARATE mode (0.5 = 50%)
# Default: 0.5
# Range: 0.0 ~ 1.0
dual_cost_ars_percentage = 0.5
#Percentage of ISS mana cost in SEPARATE mode (0.5 = 50%)
# Default: 0.5
# Range: 0.0 ~ 1.0
dual_cost_iss_percentage = 0.5
#Include armor bonuses in unified mana calculations
respect_armor_bonuses = true
#Include enchantment bonuses in unified mana calculations
respect_enchantments = true

["Ars Glyph Bonuses"]
#Bonuses applied by Ars Nouveau augment glyphs
#Damage multiplier per Amplify glyph
# Default: 0.2
# Range: 0.0 ~ 10.0
amplify_damage_bonus = 0.2
#Duration multiplier per Extend Time glyph
# Default: 1.5
# Range: 0.0 ~ 10.0
extend_time_duration_bonus = 1.5
#Additional projectiles per Split glyph
# Default: 1
# Range: 0 ~ 10
split_projectile_count = 1
#Armor penetration per Pierce glyph
# Default: 0.1
# Range: 0.0 ~ 1.0
pierce_armor_penetration = 0.1
#Critical damage multiplier per Sensitive glyph
# Default: 0.25
# Range: 0.0 ~ 10.0
sensitive_crit_bonus = 0.25

["Iron's School Bonuses"]
#Bonuses from Iron's Spellbooks school levels
#Enable school level bonuses for Ars spells
enable_school_bonuses = false
#Global multiplier for all school bonuses
# Default: 1.0
# Range: 0.0 ~ 10.0
school_bonus_multiplier = 1.0
#Fire damage bonus per school level
# Default: 0.02
# Range: 0.0 ~ 1.0
fire_school_damage = 0.02
#Ice effect duration bonus per school level
# Default: 0.02
# Range: 0.0 ~ 1.0
ice_school_duration = 0.02
#Lightning chain chance bonus per school level
# Default: 0.02
# Range: 0.0 ~ 1.0
lightning_school_chain = 0.02
#Evocation projectile speed bonus per school level
# Default: 0.02
# Range: 0.0 ~ 1.0
evocation_school_speed = 0.02
#Holy healing bonus per school level
# Default: 0.02
# Range: 0.0 ~ 1.0
holy_school_healing = 0.02
#Ender teleport range bonus per school level
# Default: 0.02
# Range: 0.0 ~ 1.0
ender_school_range = 0.02
#Blood lifesteal bonus per school level
# Default: 0.02
# Range: 0.0 ~ 1.0
blood_school_lifesteal = 0.02
#Nature growth effect bonus per school level
# Default: 0.02
# Range: 0.0 ~ 1.0
nature_school_growth = 0.02
#Eldritch debuff strength bonus per school level
# Default: 0.02
# Range: 0.0 ~ 1.0
eldritch_school_debuff = 0.02

["Resonance System"]
#Resonance grants bonuses when mana is at maximum.
#Requires ENABLE_RESONANCE_SYSTEM master toggle.
#Enable resonance bonuses for Ars Nouveau spells
enable_ars_resonance = true
#Enable resonance bonuses for Iron's Spellbooks spells
enable_irons_resonance = true
#Global multiplier for all resonance bonuses
# Default: 1.0
# Range: 0.0 ~ 10.0
resonance_strength = 1.0
#Mana percentage required to trigger resonance (0.95 = 95%)
# Default: 0.95
# Range: 0.0 ~ 1.0
resonance_threshold = 0.95
#How long resonance lasts after dropping below threshold (ticks)
# Default: 100
# Range: 0 ~ 1200
resonance_duration = 100
#Maximum damage multiplier from resonance
# Default: 5.0
# Range: 1.0 ~ 100.0
max_damage_multiplier = 5.0
#Maximum duration multiplier from resonance
# Default: 5.0
# Range: 1.0 ~ 100.0
max_duration_multiplier = 5.0
#Maximum projectile split from resonance
# Default: 5.0
# Range: 1.0 ~ 100.0
max_projectile_split = 5.0
#Maximum chain chance from resonance (1.0 = 100%)
# Default: 1.0
# Range: 0.0 ~ 1.0
max_chain_chance = 1.0
#Maximum area of effect multiplier from resonance
# Default: 5.0
# Range: 1.0 ~ 100.0
max_area_multiplier = 5.0

["Cooldown System"]
#Unified cooldown system prevents spell spam across mods.
#Requires ENABLE_COOLDOWN_SYSTEM master toggle.
#Enable cross-mod cooldown sharing
enable_unified_cooldowns = false
#Enable category-based cooldowns (offensive, defensive, etc.)
enable_category_cooldowns = false
#CRITICAL: Enable cross-mod cooldown interference (false = each mod has independent cooldowns)
enable_cross_mod_cooldowns = false
#Base category cooldown duration (ticks, 20 = 1 second)
# Default: 100
# Range: 0 ~ 10000
cooldown_category_duration = 100
#Multiplier for cross-mod cooldowns (0.5 = 50% of normal)
# Default: 0.5
# Range: 0.0 ~ 10.0
cross_mod_cooldown_multiplier = 0.5
#Maximum cooldown reduction from all sources (0.8 = 80% max reduction)
# Default: 0.8
# Range: 0.0 ~ 1.0
cooldown_reduction_cap = 0.8

["Progression System"]
#Cross-mod progression allows spell usage to grant XP in both systems.
#Requires ENABLE_PROGRESSION_SYSTEM master toggle.
#Multiplier for cross-mod XP gains
# Default: 1.0
# Range: 0.0 ~ 10.0
progression_xp_multiplier = 1.0
#Maximum level for cross-mod progression bonuses
# Default: 100
# Range: 1 ~ 1000
max_progression_level = 100
#Allow Ars spells to grant ISS XP and vice versa
enable_cross_mod_progression = true

["Affinity System"]
#Affinity system tracks spell school preferences and grants bonuses.
#Requires ENABLE_AFFINITY_SYSTEM master toggle.
#Multiplier for affinity bonuses
# Default: 1.0
# Range: 0.0 ~ 10.0
affinity_bonus_multiplier = 1.0
#Maximum bonus from affinity (0.25 = 25% max bonus)
# Default: 0.25
# Range: 0.0 ~ 10.0
max_affinity_bonus = 0.25
#Enable affinity decay when not using a school
enable_affinity_decay = true
#Rate of affinity decay per day (in-game)
# Default: 0.01
# Range: 0.0 ~ 1.0
affinity_decay_rate = 0.01

["Curio Discount System"]
#Mana cost discounts from Covenant of the Seven curios.
#Ring of Virtue and Blasphemy curios can reduce Ars Nouveau spell costs.
#Enable mana cost discounts from Ring of Virtue and Blasphemy curios
enable_curio_discounts = true
#Mana cost discount from Ring of Virtue (0.20 = 20% reduction)
# Default: 0.2
# Range: 0.0 ~ 1.0
virtue_ring_discount = 0.2
#Base mana cost discount from Blasphemy curios (0.15 = 15% reduction)
# Default: 0.15
# Range: 0.0 ~ 1.0
blasphemy_discount = 0.15
#Additional discount when Blasphemy school matches spell school (0.10 = 10% extra)
# Default: 0.1
# Range: 0.0 ~ 1.0
blasphemy_matching_school_bonus = 0.1
#Allow Ring of Virtue and Blasphemy discounts to stack multiplicatively
allow_discount_stacking = true

["Cursed Ring LP System"]
#Controls behavior when casting spells with insufficient LP (Cursed Ring).
#Applies to both Ars Nouveau and Iron's Spellbooks spells.
#Where to consume LP from when wearing the Cursed Ring:
#  BLOOD_MAGIC_PRIORITY - Use Blood Magic if available, fall back to health (DEFAULT)
#  BLOOD_MAGIC_ONLY - Only use Blood Magic Soul Network (fails if Blood Magic not installed)
#  HEALTH_ONLY - Always use player health (100 LP = 10 health = 5 hearts)
lp_source_mode = "BLOOD_MAGIC_PRIORITY"
#If enabled: Spell casts but player dies when LP is insufficient
#If disabled: Spell is cancelled and player takes minor damage (1 heart)
death_on_insufficient_lp = false
#Show LP cost messages in action bar when casting spells
show_lp_cost_messages = true
#Enable compatibility fix for Corpse mods (e.g., henkelmax's Corpse mod).
#When enabled, player inventory is snapshot/restored when LP-related death is prevented.
#Prevents inventory deletion when a corpse mod processes the death before our cancellation.
enable_corpse_mod_compat = true

["LP Calculation - Ars Nouveau"]
#Configure how LP costs are calculated for Ars Nouveau spells.
#Formula: LP = (Mana Cost x Base Multiplier) x Tier Multiplier
#Health cost = LP / 10 (so 10 LP = 1 health = 0.5 hearts)
#Minimum LP cost is enforced after all calculations.
#Base LP multiplier (Mana x this value = base LP cost)
#Default 1.0: A 20 mana spell costs ~30 LP = 3 health (1.5 hearts)
# Default: 1.0
# Range: 0.1 ~ 100.0
ars_lp_base_multiplier = 1.0
#LP multiplier for Tier 1 glyphs
# Default: 1.5
# Range: 0.1 ~ 10.0
ars_lp_tier1_multiplier = 1.5
#LP multiplier for Tier 2 glyphs
# Default: 2.0
# Range: 0.1 ~ 10.0
ars_lp_tier2_multiplier = 2.0
#LP multiplier for Tier 3 glyphs
# Default: 2.5
# Range: 0.1 ~ 10.0
ars_lp_tier3_multiplier = 2.5
#Minimum LP cost for any Ars Nouveau spell (10 LP = 1 health)
# Default: 10
# Range: 1 ~ 10000
ars_lp_minimum_cost = 10

["LP Calculation - Iron's Spellbooks"]
#Configure how LP costs are calculated for Iron's Spellbooks spells.
#Formula: LP = (Mana Cost x Base Multiplier) x (1 + Level x Level Multiplier) x Rarity Multiplier
#Health cost = LP / 10 (so 10 LP = 1 health = 0.5 hearts)
#Minimum LP cost is enforced after all calculations.
#Base LP multiplier (Mana x this value = base LP cost)
#Default 0.5: Iron's spells have higher base mana costs, so use lower multiplier
# Default: 0.5
# Range: 0.1 ~ 100.0
irons_lp_base_multiplier = 0.5
#Additional LP cost per spell level (0.1 = 10% per level)
# Default: 0.1
# Range: 0.0 ~ 10.0
irons_lp_per_level_multiplier = 0.1
#Minimum LP cost for any Iron's Spellbooks spell (10 LP = 1 health)
# Default: 10
# Range: 1 ~ 10000
irons_lp_minimum_cost = 10

["LP Rarity Multipliers - Iron's Spells"]
#Multipliers based on spell rarity for Iron's Spellbooks.
#Higher rarity = higher LP cost.
#LP multiplier for COMMON rarity spells
# Default: 1.0
# Range: 0.1 ~ 100.0
irons_lp_common_multiplier = 1.0
#LP multiplier for UNCOMMON rarity spells
# Default: 1.5
# Range: 0.1 ~ 100.0
irons_lp_uncommon_multiplier = 1.5
#LP multiplier for RARE rarity spells
# Default: 2.0
# Range: 0.1 ~ 100.0
irons_lp_rare_multiplier = 2.0
#LP multiplier for EPIC rarity spells
# Default: 3.0
# Range: 0.1 ~ 100.0
irons_lp_epic_multiplier = 3.0
#LP multiplier for LEGENDARY rarity spells
# Default: 5.0
# Range: 0.1 ~ 100.0
irons_lp_legendary_multiplier = 5.0

["Aura System"]
#Aura resource system for Ring of Seven Virtues.
#When wearing the Virtue Ring, spell mana costs are replaced with aura costs.
#Aura regenerates passively over time.
#Default maximum aura pool
# Default: 1000
# Range: 100 ~ 100000
aura_max_default = 1000
#Aura regenerated per tick (20 ticks = 1 second). 0.5 = 10 aura/sec
# Default: 0.5
# Range: 0.0 ~ 100.0
aura_regen_rate = 0.5
#Base conversion from mana cost to aura cost (mana x this = base aura)
# Default: 1.0
# Range: 0.1 ~ 100.0
aura_base_multiplier = 1.0
#Aura cost multiplier for Tier 1 glyphs
# Default: 1.0
# Range: 0.1 ~ 10.0
aura_tier1_multiplier = 1.0
#Aura cost multiplier for Tier 2 glyphs
# Default: 1.5
# Range: 0.1 ~ 10.0
aura_tier2_multiplier = 1.5
#Aura cost multiplier for Tier 3 glyphs
# Default: 2.0
# Range: 0.1 ~ 10.0
aura_tier3_multiplier = 2.0
#Minimum aura cost for any spell
# Default: 5
# Range: 1 ~ 10000
aura_minimum_cost = 5
#Show aura cost messages in action bar when casting spells
show_aura_messages = true

["Scroll Cost System"]
#Controls resource costs when casting Iron's Spellbooks spells from scrolls.
#Cost mode for Iron's Spellbooks scroll usage:
#  full - Scrolls consume mana and LP just like normal casting
#  lp_only - Scrolls are free of mana cost but still consume LP if Cursed Ring equipped
#  free - Scrolls have no resource cost (LP from Cursed Ring still applies)
scroll_cost_mode = "full"

["Mana Defaults"]
#Default mana pool settings.
#These values are used as baseline when no other system overrides them.
#Can be overridden per-player via the /ans maxmana command.
#Default maximum mana for players
# Default: 100
# Range: 1 ~ 100000
default_max_mana = 100

[Performance]
#Performance optimization settings
#Mana synchronization interval (ticks, lower = more responsive but higher CPU)
# Default: 1
# Range: 1 ~ 100
mana_sync_interval = 1
#Enable caching for expensive calculations
enable_caching = true
#Cache duration (ticks)
# Default: 20
# Range: 1 ~ 200
cache_duration = 20
