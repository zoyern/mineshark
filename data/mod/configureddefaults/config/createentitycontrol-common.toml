[blocks_limit]
	#--------------------------------------------------------------------------
	#The count limit of blocks that are used in block entities. The first para is count limit and the second para is stabilize para.
	blocks_limit = [["create:deployer", 256, 100], ["create:mechanical_drill", 256, 100], ["create:mechanical_roller", 64, 100], ["minecraft:dirt", 2048, 10000], ["create:linear_chassis", 2048, -100], ["minecraft:netherrack", 2048, 5000], ["minecraft:stone", 2048, 4000], ["minecraft:deepslate", 2048, 4000], ["minecraft:end_stone", 2048, 4000], ["minecraft:white_wool", 2048, 80], ["create:item_vault", 2048, 360], ["metalbarrels:obsidian_barrel", 2048, 1800], ["metalbarrels:diamond_barrel", 2048, 1800], ["metalbarrels:crystal_barrel", 2048, 1800], ["metalbarrels:netherite_barrel", 2048, 2000], ["metalbarrels:gold_barrel", 2048, 1100], ["metalbarrels:iron_barrel", 2048, 800], ["metalbarrels:copper_barrel", 2048, 700], ["minecraft:barrel", 2048, 400], ["minecraft:chest", 2048, 800], ["twilightforest:twilight_oak_chest", 2048, 800], ["twilightforest:canopy_chest", 2048, 800], ["twilightforest:mangrove_chest", 2048, 800], ["twilightforest:dark_chest", 2048, 800], ["twilightforest:time_chest", 2048, 800], ["twilightforest:transformation_chest", 2048, 800], ["twilightforest:mining_chest", 2048, 800], ["twilightforest:sorting_chest", 2048, 800], ["ae2:smooth_sky_stone_chest", 2048, 800], ["quark:ancient_chest", 2048, 800], ["quark:azalea_chest", 2048, 800], ["quark:blossom_chest", 2048, 800], ["quark:oak_chest", 2048, 800], ["quark:spruce_chest", 2048, 800], ["quark:birch_chest", 2048, 800], ["quark:jungle_chest", 2048, 800], ["quark:acacia_chest", 2048, 800], ["quark:dark_oak_chest", 2048, 800], ["quark:crimson_chest", 2048, 800], ["quark:mangrove_chest", 2048, 800], ["quark:cherry_chest", 2048, 800]]
	#--------------------------------------------------------------------------
	#Default on this config will ignore one entity crush at first time.
	#This can keep miner not broken at the first time crush for helping player.
	keep_structure_at_first = true
	#--------------------------------------------------------------------------
	#The time record list refresh default 3600s
	#If a structure is ignored at first time and if the second time less than 3600s
	#The structure will controlled by this mod while more than 3600s will controlled by Create.
	# Default: 3600
	# Range: 0 ~ 36000
	"keep structure refresh time(s)" = 3600
	#--------------------------------------------------------------------------
	#Whether to log the block entity problem if it can't turned into block entities.
	"Log block entity problem" = false
	#--------------------------------------------------------------------------
	#Whether to log debug information for extra runtime control logic such as contraption clusters.
	debug = false
	#--------------------------------------------------------------------------
	#10x of destroy speed | If you set 14 and will calculate 1.4 as destroy speed 
	#Exp: obsidian is 40 and 400 in this case, dirt is 0.5 and 5 set in this case. 
	#default value is suggested because dirt and sand will drop but stone will stay
	# Default: 14
	# Range: > 0
	"10% of destroy speed" = 14
	#--------------------------------------------------------------------------
	#Dedicated max speed for Mechanical Bearing rotation.
	#0 disables this cap. If Create provides 256 and you set 128, the bearing rotates at 128.
	#If you set a value higher than the original Create speed, the original speed is kept.
	# Default: 128
	# Range: > 0
	"mechanical bearing gear max speed" = 128
	#--------------------------------------------------------------------------
	#The longest XZ distance of block entity | If set 20: 17*42*20 is allowed but 20*42*21 is forbidden.
	# Default: 40
	# Range: 3 ~ 500
	"block entity max length XZ" = 40
	#--------------------------------------------------------------------------
	#The longest Y  distance of block entity | If set 20: 42*14*42 is allowed but 42*24*42 is forbidden.
	# Default: 60
	# Range: 3 ~ 500
	"block entity max length Y" = 60
	#--------------------------------------------------------------------------
	#The scan radius used by contraption cluster detection.
	#Only contraptions within this radius will be merged into one cluster for cluster-level limit checks.
	# Default: 96.0
	# Range: 1.0 ~ 512.0
	"contraption cluster scan radius" = 96.0
	#--------------------------------------------------------------------------
	#The local notify radius for nearby actionbar hints and overlay sync.
	# Default: 96.0
	# Range: 1.0 ~ 512.0
	"contraption cluster local notify radius" = 96.0
	#--------------------------------------------------------------------------
	#The search radius used to list nearby players inside the global cluster-blocked message.
	#This does not change who receives the global message.
	# Default: 96.0
	# Range: 1.0 ~ 512.0
	"contraption cluster global nearby players radius" = 96.0
	#--------------------------------------------------------------------------
	#Multiplier applied to cluster-level aggregated block limits from blocks_limit.
	#Single-contraption limits stay unchanged; only the cluster total uses this multiplier.
	# Default: 1.5
	# Range: 0.0 ~ 64.0
	"contraption cluster block limit multiplier" = 1.5
	#--------------------------------------------------------------------------
	#Enable chained cluster detection for nearby multiple contraptions.
	#This can detect multi-entity clusters, but it costs some extra performance.
	"contraption cluster chain detection" = true
	#--------------------------------------------------------------------------
	#How often contraption cluster validation runs, in seconds.
	#This controls the periodic cluster scan cooldown added for performance control.
	# Default: 1
	# Range: 1 ~ 10
	"contraption cluster scan interval seconds" = 1
	#--------------------------------------------------------------------------
	#Cooldown for global cluster-blocked chat notifications, in minutes.
	# Default: 5
	# Range: 1 ~ 60
	"contraption cluster global notify cooldown minutes" = 5
	#--------------------------------------------------------------------------
	#A list of blocks can't be moved and change into block entities.
	blocks_unmoved = ["create:mechanical_crafter", "supplementaries:notice_board", "minecraft:cobblestone", "minecraft:stone", "minecraft:deepslate", "create:belt", "create:white_toolbox", "create:orange_toolbox", "create:magenta_toolbox", "create:yellow_toolbox", "create:lime_toolbox", "create:brown_toolbox", "create:pink_toolbox", "create:gray_toolbox", "create:light_gray_toolbox", "create:light_blue_toolbox", "create:blue_toolbox", "create:purple_toolbox", "create:cyan_toolbox", "create:green_toolbox", "create:red_toolbox", "create:black_toolbox", "minecraft:spawner", "mynethersdelight:powdery_cannon"]
	#--------------------------------------------------------------------------
	#A list of blocks can't be crushed by block entities. 
	#If you squeeze a stone with dirt and stone in this list the dirt will drop while stone leave!
	blocks_uncrushable = ["minecraft:deepslate", "minecraft:stone", "minecraft:cobblestone"]
	#--------------------------------------------------------------------------
	#A list of blocks can be crushed by block entities.
	#Create's default config.
	#If you squeeze a stone with dirt and stone in this list the stone will drop while dirt leave!
	#If you add fluid, these fluid will vanish like create vanilla
	#Warning:Block burned by lava might be conflict with player,you can add minecraft:lava to avoid block burned by lava!
	blocks_crushable = ["minecraft:water", "minecraft:lava"]
	#--------------------------------------------------------------------------
	#A list of blocks will be ignored by entity control
	#Some block entity use the same func but they have unique method and para.
	#Add all of them in this list will ignore these entity
	#default config compat with Create:big cannon! Just add new block not remove them!  
	#Warning! Make sure these new added block won't with bug!
	blocks_ignore = ["create:piston_extension_pole"]
	#--------------------------------------------------------------------------
	#When enabled, blocks will calculate the experiment para for block entities.This might take very little time.
	"calculate block stabilize para" = true
	#--------------------------------------------------------------------------
	#The max limit of stabilize para. One normal block have 100 default stabilize count.
	#Set depend on storage box can avoid block entities NBT overflow.
	# Default: 204800
	# Range: > 0
	"block entity max stabilize para" = 204800
