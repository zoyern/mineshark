# ═══════════════════════════════════════════════════════════════════
#  MineShark — Overrides Docker Compose pour le DEV local
# ═══════════════════════════════════════════════════════════════════
#  AUTO-CHARGÉ par `docker compose` (nom exact requis : override).
#
#  But : adapter les ressources pour une machine de dev (~6 Go RAM
#  WSL/laptop) sans toucher au compose principal qui reste calé
#  sur les valeurs de prod (.env).
#
#  Si tu n'en veux pas : supprime ce fichier ou ajoute-le à .gitignore.
# ═══════════════════════════════════════════════════════════════════

services:
  proxy-velocity:
    environment:
      MEMORY: "256M"

  main-paper:
    environment:
      MEMORY: "1G"
      VIEW_DISTANCE: "6"        # baisse pour économiser la RAM
      SIMULATION_DISTANCE: "4"

  mod-neoforge:
    environment:
      MEMORY: "3G"              # plancher pour Modded Together en dev
