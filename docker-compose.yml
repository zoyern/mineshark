# ═══════════════════════════════════════════════════════════════════
#  MineShark — Docker Compose (environnement DEV local)
# ═══════════════════════════════════════════════════════════════════
#
#  Source de vérité pour le développement local. Doit rester aligné
#  avec les manifestes K8s (k8s/) — toute valeur configurable est
#  dans .env, pas en dur ici.
#
#  Lancement : `make docker-up`
#  Le fichier docker-compose.override.yml (s'il existe) est chargé
#  automatiquement et permet d'ajuster la RAM en local (~6 Go WSL).
#
#  Secrets :
#    • RCON_PASSWORD      généré auto dans data/secrets/rcon.secret
#                         et injecté par le Makefile (docker-up)
#    • forwarding.secret  généré auto dans data/velocity/forwarding.secret
#                         et monté en volume read-only sur les backends
# ═══════════════════════════════════════════════════════════════════

services:

  # ─── Proxy Velocity (point d'entrée unique Java + Bedrock) ───────
  proxy-velocity:
    image: ${IMG_PROXY:-itzg/mc-proxy:java21}
    container_name: ms-proxy
    # Sécurité : tourne en non-root (user `minecraft` dans l'image itzg,
    # UID 1000 par défaut). `no-new-privileges` empêche tout processus
    # enfant d'obtenir plus de droits que son parent.
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    read_only: false               # MC écrit logs/plugins/cache
    environment:
      TYPE: VELOCITY
      MEMORY: ${PROXY_MEMORY:-512M}
      # Plugins téléchargés au boot par itzg/mc-proxy.
      # On n'utilise pas MODRINTH_PROJECTS ici car Geyser a un build
      # "velocity" spécifique non-Modrinth.
      PLUGINS: |
        https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/velocity
        https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/velocity
        https://github.com/ViaVersion/ViaVersion/releases/download/5.8.0/ViaVersion-5.8.0.jar
        https://github.com/ViaVersion/ViaBackwards/releases/download/5.8.1/ViaBackwards-5.8.1.jar
    ports:
      - "${PORT_JAVA:-25565}:25577"           # Java
      - "${PORT_BEDROCK:-19132}:19132/udp"    # Bedrock (UDP impératif)
    volumes:
      # /server complet persistant (plugins data) + velocity.toml read-only
      - ./data/velocity:/server
      - ./config/velocity.toml:/server/velocity.toml:ro
    networks:
      - mc-network
    restart: unless-stopped
    healthcheck:
      test: mc-monitor status --host localhost --port 25577
      interval: 5s
      retries: 10
      start_period: 10s


  # ─── Serveur principal Purpur (lobby + survie, derrière Velocity) ─
  # Purpur = fork de Pufferfish (lui-même fork de Paper). Hérite des
  # optimisations de perf de Pufferfish + ajoute des features gameplay
  # (double-jump, lobby AFK, ride mobs, recettes custom, etc.).
  # 100% compatible plugins Paper, aucune bascule code nécessaire.
  main-paper:
    image: ${IMG_SERVER:-itzg/minecraft-server:java21}
    container_name: ms-main
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    depends_on:
      proxy-velocity:
        condition: service_healthy
    environment:
      EULA: "TRUE"
      TYPE: PURPUR                # synced with .env SERVER_TYPE
      VERSION: ${PAPER_VERSION:-1.21.4}
      MEMORY: ${MAIN_MEMORY:-3G}
      USE_AIKAR_FLAGS: "true"

      # Velocity gère l'auth Mojang côté proxy. Le backend accepte
      # uniquement les connexions qui présentent le bon secret partagé.
      ONLINE_MODE: "FALSE"
      PAPER_VELOCITY_SECRET_FILE: /run/secrets/forwarding-secret

      MOTD: "${MAIN_MOTD}"
      MAX_PLAYERS: ${MAIN_MAX_PLAYERS:-50}
      DIFFICULTY: ${DIFFICULTY_MAIN:-normal}
      VIEW_DISTANCE: ${VIEW_DISTANCE:-8}
      SIMULATION_DISTANCE: ${SIMULATION_DISTANCE:-5}
      SPAWN_PROTECTION: "0"         # WorldGuard gère la protection fine
      SPAWN_LIMIT: 40

      # RCON pour administration distante (backups, console).
      # Le mot de passe est injecté par `make docker-up`
      # depuis data/secrets/rcon.secret (jamais en dur).
      ENABLE_RCON: "true"
      RCON_PASSWORD: ${RCON_PASSWORD}

      # Plugins via Modrinth (résolution auto des versions)
      MODRINTH_PROJECTS: ${PLUGINS_MODRINTH}
      # Plugins hors-Modrinth : Floodgate (GeyserMC) + ViaVersion/ViaBackwards
      # (permet aux clients MC 1.8 → 1.21 de se connecter sur un serveur 1.21).
      PLUGINS: |
        https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot
        https://github.com/ViaVersion/ViaVersion/releases/download/5.8.0/ViaVersion-5.8.0.jar
        https://github.com/ViaVersion/ViaBackwards/releases/download/5.8.1/ViaBackwards-5.8.1.jar

      # Pre-pull des configs Paper/Purpur optimisées au 1er boot.
      # itzg copie /config/<fichier> → /data/config/<fichier> si absent.
      COPY_CONFIG_DEST: "/data"
    volumes:
      - ./data/main:/data
      - ./data/velocity/forwarding.secret:/run/secrets/forwarding-secret:ro
      # Configs serveur optimisées (paper-global, purpur, spigot, bukkit)
      # montées au 1er boot — ensuite éditable via data/main/config/.
      - ./config/paper-global.yml:/config/paper-global.yml:ro
      - ./config/paper-world-defaults.yml:/config/paper-world-defaults.yml:ro
      - ./config/purpur.yml:/config/purpur.yml:ro
    networks:
      - mc-network
    restart: unless-stopped
    healthcheck:
      test: mc-health
      start_period: 2m            # Purpur + plugins au 1er boot = boot lent
      interval: 10s
      retries: 20
      timeout: 10s


  # ─── Backup automatique du serveur principal ─────────────────────
  # Se réveille toutes les 24h, stoppe le monde via RCON, tar.gz,
  # relance le monde. Garde 7 jours de snapshots glissants.
  backup-main:
    image: ${IMG_BACKUP:-itzg/mc-backup:latest}
    container_name: ms-backup-main
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    depends_on:
      main-paper:
        condition: service_healthy
    environment:
      BACKUP_INTERVAL: 24h
      PRUNE_BACKUPS_DAYS: 7
      RCON_HOST: ms-main
      RCON_PASSWORD: ${RCON_PASSWORD}
    volumes:
      - ./data/main:/data:ro
      - ./backups/main:/backups
    networks:
      - mc-network
    restart: unless-stopped


  # ─── Serveur moddé NeoForge (STANDALONE, opt-in) ─────────────────
  # Activation : `make docker-mod-up` (ne démarre pas par défaut).
  # Pas derrière Velocity : Velocity force un protocole vanilla qui
  # casse NeoForge. Donc port public propre + auth Mojang directe.
  mod-neoforge:
    image: ${IMG_SERVER:-itzg/minecraft-server:java21}
    container_name: ms-mod
    profiles: ["mod"]
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    # Aucune dépendance sur le serveur principal : le moddé tourne seul.
    environment:
      EULA: "TRUE"
      TYPE: ${MODPACK_TYPE:-AUTO_CURSEFORGE}
      CF_SLUG: ${MODPACK_SLUG:-moddedtogether}
      CF_API_KEY: ${CF_API_KEY}
      MEMORY: ${MOD_MEMORY:-8G}
      USE_AIKAR_FLAGS: "true"
      # Standalone → auth Mojang directe (pas de forwarding Velocity)
      ONLINE_MODE: "TRUE"
      MOTD: "${MOD_MOTD}"
      MAX_PLAYERS: ${MOD_MAX_PLAYERS:-30}
      DIFFICULTY: ${DIFFICULTY_MOD:-hard}
      VIEW_DISTANCE: ${VIEW_DISTANCE:-8}
      SIMULATION_DISTANCE: ${SIMULATION_DISTANCE:-5}
      ENABLE_RCON: "true"
      RCON_PASSWORD: ${RCON_PASSWORD}
    ports:
      # Port public dédié (différent du 25565 occupé par le proxy)
      - "${PORT_MOD:-25566}:25565"
    volumes:
      - ./data/mod:/data
    networks:
      - mc-network
    restart: unless-stopped
    healthcheck:
      test: mc-health
      start_period: 3m       # Modpack lourd = boot lent
      interval: 10s
      retries: 30


networks:
  mc-network:
    driver: bridge
    name: mineshark
