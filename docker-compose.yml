# ═══════════════════════════════════════════════════════
#  MineShark — Docker Compose (dev local)
#  Utilisé pour tester sans K3s : make docker-up
# ═══════════════════════════════════════════════════════

services:
  # ── Proxy Velocity ─────────────────────────────────
  proxy-velocity:
    image: itzg/mc-proxy:latest
    container_name: ms-proxy
    environment:
      TYPE: "VELOCITY"
      MEMORY: "512M"
      PLUGINS: |
        https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/velocity
        https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/velocity
        https://github.com/ViaVersion/ViaVersion/releases/download/5.8.0/ViaVersion-5.8.0.jar
        https://github.com/ViaVersion/ViaBackwards/releases/download/5.8.1/ViaBackwards-5.8.1.jar
    ports:
      - "25565:25577"       # Java
      - "19132:19132/udp"   # Bedrock
    volumes:
      - ./data/velocity:/server
    networks:
      - mc-network
    restart: unless-stopped
    healthcheck:
      test: mc-monitor status --host localhost --port 25577
      interval: 5s
      retries: 10
      start_period: 10s

  # ── Paper Main (Survie vanilla + lobby) ────────────
  main-paper:
    image: itzg/minecraft-server:latest
    container_name: ms-main
    depends_on:
      proxy-velocity:
        condition: service_healthy
    environment:
      TYPE: "PAPER"
      VERSION: "1.21.1"
      EULA: "TRUE"
      MEMORY: "2G"
      USE_AIKAR_FLAGS: "true"
      ONLINE_MODE: "FALSE"
      ENABLE_RCON: "true"
      RCON_PASSWORD: "${RCON_PASSWORD}"
      MOTD: "§b§lMineShark §7- §aSurvie"
      MAX_PLAYERS: "50"
      DIFFICULTY: "normal"
      VIEW_DISTANCE: "8"
      SIMULATION_DISTANCE: "5"
      SPAWN_LIMIT: "40"
      PLUGINS: |
        https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot
    volumes:
      - ./data/main:/data
    networks:
      - mc-network
    restart: unless-stopped
    healthcheck:
      test: mc-health
      start_period: 1m
      interval: 10s
      retries: 20
      timeout: 10s

  # ── Backup automatique ─────────────────────────────
  backup-main:
    image: itzg/mc-backup
    container_name: ms-backup-main
    depends_on:
      main-paper:
        condition: service_healthy
    environment:
      BACKUP_INTERVAL: "24h"
      PRUNE_BACKUPS_DAYS: "7"
      RCON_HOST: "ms-main"
      RCON_PASSWORD: "${RCON_PASSWORD}"
    volumes:
      - ./data/main:/data:ro
      - ./backups/main:/backups
    networks:
      - mc-network

  # ── NeoForge Moddé (profil docker-compose --profile mod) ──
  mod-neoforge:
    image: itzg/minecraft-server:latest
    container_name: ms-mod
    profiles: ["mod"]
    depends_on:
      main-paper:
        condition: service_healthy
    environment:
      TYPE: "AUTO_CURSEFORGE"
      CF_SLUG: "moddedtogether"
      CF_API_KEY: "${CF_API_KEY}"
      EULA: "TRUE"
      MEMORY: "6G"
      USE_AIKAR_FLAGS: "true"
      ONLINE_MODE: "FALSE"
      MOTD: "§b§lMineShark §7- §cModdé"
      MAX_PLAYERS: "30"
      DIFFICULTY: "hard"
      VIEW_DISTANCE: "8"
      SIMULATION_DISTANCE: "5"
      ENABLE_RCON: "true"
      RCON_PASSWORD: "${RCON_PASSWORD}"
    volumes:
      - ./data/mod:/data
    networks:
      - mc-network
    restart: unless-stopped
    healthcheck:
      test: mc-health
      start_period: 3m
      interval: 10s
      retries: 20

networks:
  mc-network:
    driver: bridge
